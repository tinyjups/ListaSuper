<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fondo verde redondeado -->
  <rect width="512" height="512" rx="110" fill="#3B6D11"/>

  <!-- Bolsa de supermercado -->
  <g transform="translate(256,256)">
    <!-- Cuerpo de la bolsa -->
    <rect x="-115" y="-60" width="230" height="190" rx="22" fill="#ffffff"/>
    <!-- Sombra interior bolsa -->
    <rect x="-115" y="-60" width="230" height="40" rx="0" fill="#e8f5d0" opacity="0.5"/>
    <rect x="-115" y="-22" width="230" height="4" fill="#c8e6a0" opacity="0.6"/>

    <!-- Asas de la bolsa -->
    <path d="M-60,-60 L-60,-105 Q-60,-140 -20,-140 Q20,-140 20,-105 L20,-60" 
          fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round"/>

    <!-- Hoja / vegetal dentro de la bolsa -->
    <ellipse cx="-28" cy="60" rx="38" ry="48" fill="#5AAF1E" transform="rotate(-20,-28,60)"/>
    <ellipse cx="-28" cy="60" rx="38" ry="48" fill="#4A9A10" opacity="0.4" transform="rotate(-20,-28,60) translate(6,0)"/>
    <line x1="-28" y1="20" x2="-28" y2="100" stroke="#3B6D11" stroke-width="3" opacity="0.6"/>
    <line x1="-28" y1="50" x2="-55" y2="35" stroke="#3B6D11" stroke-width="2" opacity="0.5"/>
    <line x1="-28" y1="65" x2="-10" y2="50" stroke="#3B6D11" stroke-width="2" opacity="0.5"/>

    <!-- Fruta / naranja -->
    <circle cx="42" cy="72" r="36" fill="#E8821A"/>
    <circle cx="42" cy="72" r="36" fill="#F5922A" opacity="0.5"/>
    <path d="M42,38 Q48,30 44,26" stroke="#4A9A10" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Textura naranja -->
    <circle cx="34" cy="65" r="3" fill="#C96A10" opacity="0.4"/>
    <circle cx="50" cy="78" r="3" fill="#C96A10" opacity="0.4"/>
    <circle cx="40" cy="82" r="2" fill="#C96A10" opacity="0.3"/>
  </g>

  <!-- Texto "LS" pequeño abajo -->
  <text x="256" y="470" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" 
        font-size="52" font-weight="700" fill="#ffffff" opacity="0.55" letter-spacing="6">SÚPER</text>
</svg>
